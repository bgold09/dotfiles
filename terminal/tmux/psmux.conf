# psmux configuration for Windows
# Solarized Dark theme to match Windows Terminal settings

# Shared settings (prefix, vi keys, splits, navigation, history, etc.)
source-file ~/.base.tmux.conf

# Shell
set -g default-shell pwsh

# Mouse
set -g mouse on
set -g mouse-selection off

# Cursor: filled block in Solarized blue (matches WT cursorShape/cursorColor)
set -g cursor-style block
set -g cursor-blink off

# Bell: disabled (matches WT bellStyle: none)
set -g bell-action none

# Clipboard
set -g set-clipboard on

# Solarized Dark status bar
# base03 #002B36 (bg), base0 #839496 (fg), base1 #93A1A1, base00 #657B83
# blue #268BD2, cyan #2AA198, green #859900, yellow #B58900
set -g status-style "bg=#073642,fg=#839496"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#002B36,bg=#268BD2,bold] #S #[fg=#268BD2,bg=#073642,nobold] "
set -g status-right "#[fg=#586E75]%H:%M %d-%b "

# Window status (tabs)
set -g window-status-format "#[fg=#657B83] #I:#W "
set -g window-status-current-format "#[fg=#002B36,bg=#859900,bold] #I:#W #[fg=#859900,bg=#073642,nobold]"
set -g window-status-activity-style "fg=#B58900"
set -g window-status-separator ""

# Pane borders in Solarized colors
set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268BD2"

# Message/command bar
set -g message-style "bg=#B58900,fg=#002B36"

# Copy mode highlight
set -g mode-style "bg=#268BD2,fg=#FDF6E3"

# Local config
if-shell "Test-Path ~/.psmux.conf.user" "source-file ~/.psmux.conf.user"

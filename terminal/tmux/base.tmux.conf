# Shared tmux/psmux settings
# Sourced by both tmux.conf (unix) and psmux.conf (windows)

# Prefix: C-a (screen-style)
unbind C-b
set -g prefix C-a
bind a send-prefix

# No escape delay for vi mode
set -sg escape-time 0

# Window/pane numbering starts at 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Bigger history
set -g history-limit 10000

# Rename windows based on active command
setw -g automatic-rename on

# Reorder windows on close
set-option -g renumber-windows on

# Use vi keybindings
set -g status-keys vi
setw -g mode-keys vi

# Keep your finger on ctrl, or don't
bind-key ^D detach-client

# Create splits
bind-key v split-window -h
bind-key ^V split-window -h
bind-key s split-window
bind-key ^S split-window

# Pane resize in all four directions using vi bindings
bind-key J resize-pane -D
bind-key K resize-pane -U
bind-key H resize-pane -L
bind-key L resize-pane -R

# Pane switching with Alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Screen-style binding for last window
unbind l
bind C-a last-window

# Toggle synchronize-panes (mnemonic: e is for echo)
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on
